name: Pokemon Flip Analysis

on:
  workflow_dispatch:

# NOTE: This workflow requires .tmp/ppt_cards.csv to be present.
# pokemonpricetracker.com blocks GitHub Actions IPs, so you must:
#   1. Run `python execution/scrape_ppt.py` on your local machine
#   2. Upload .tmp/ppt_cards.csv as a workflow artifact or commit it temporarily
# The workflow runs image analysis + email on whatever ppt_cards.csv is present.

jobs:
  analyze:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run flip analysis
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GRADING_FEE: ${{ secrets.GRADING_FEE }}
          SELLING_FEE_RATE: ${{ secrets.SELLING_FEE_RATE }}
          GOOGLE_SPREADSHEET_ID: ${{ secrets.GOOGLE_SPREADSHEET_ID }}
          EBAY_APP_ID: ${{ secrets.EBAY_APP_ID }}
          EBAY_CERT_ID: ${{ secrets.EBAY_CERT_ID }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
        run: python execution/run_analysis.py

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: flip-results-${{ github.run_id }}
          path: .tmp/
          retention-days: 14
          include-hidden-files: true
